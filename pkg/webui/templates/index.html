{{define "content"}}
<main class="app-shell" data-branding="{{.Branding}}">
  <header class="topbar">
    <a class="brand" href="/" data-brand-reset aria-label="Reset dashboard filters">
      <img class="brand-logo" src="/static/logo_s.png" alt="" width="200" height="147" aria-hidden="true">
      <h1>{{.Branding}}</h1>
    </a>

    <div class="dropdown gpu-selector" data-dropdown="gpu">
      <button class="dropdown-trigger gpu-trigger" type="button" data-gpu-trigger aria-expanded="false">
        <span data-gpu-summary>Waiting for GPUs</span>
      </button>
      <div class="dropdown-panel gpu-panel" data-gpu-panel>
        <div class="dropdown-actions">
          <button type="button" data-select-all>Select all</button>
          <button type="button" data-clear-all>Clear all</button>
        </div>
        <div class="device-list" data-device-list>
          <span class="muted">Waiting for devices...</span>
        </div>
      </div>
    </div>

    <div class="dropdown chart-selector" data-dropdown="charts">
      <button class="dropdown-trigger chart-trigger" type="button" data-chart-trigger aria-expanded="false">
        <span data-chart-summary>Default charts</span>
      </button>
      <div class="dropdown-panel chart-panel" data-chart-panel>
        <div class="dropdown-actions">
          <button type="button" data-chart-select-all>Select all</button>
          <button type="button" data-chart-clear-all>Clear all</button>
        </div>
        <div class="chart-list" data-chart-list></div>
      </div>
    </div>

    <div class="topbar-spacer"></div>

    <div class="dropdown time-selector" data-dropdown="time">
      <label class="time-input-label">
        <span>Time window:</span>
        <input type="number" min="1" step="1" value="5" data-time-minutes aria-label="Time window in minutes">
        <span>min</span>
      </label>
      <div class="dropdown-panel time-panel" data-time-panel>
        <button type="button" data-time-preset="5">5 min</button>
        <button type="button" data-time-preset="15">15 min</button>
        <button type="button" data-time-preset="60">1 hour</button>
      </div>
    </div>

    <div class="refresh-section" aria-live="polite">
      <span class="status-dot" data-status-dot></span>
      <span class="last-update" data-status-label>Starting</span>
      <select data-refresh-interval aria-label="Refresh interval">
        <optgroup label="Auto-refresh">
          <option value="0">Off</option>
          <option value="1000" selected>1 sec</option>
          <option value="5000">5 sec</option>
          <option value="60000">1 min</option>
          <option value="300000">5 min</option>
        </optgroup>
      </select>
      <button class="primary-action" type="button" data-refresh-now>Refresh now</button>
    </div>
  </header>

  <section class="summary" data-summary aria-label="Current GPU values"></section>
  <section class="charts-grid" data-charts aria-label="GPU metric charts"></section>
  <footer class="app-footer">
    <a href="https://github.com/deniskrumko/nvidia-smi-web-ui" target="_blank" rel="noreferrer">deniskrumko/nvidia-smi-web-ui {{.Version}}</a>
  </footer>
</main>
{{end}}
