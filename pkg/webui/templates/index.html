{{define "content"}}
<main class="app-shell" data-branding="{{.Branding}}" data-hosts="{{.HostsJSON}}">
  <header class="topbar">
    <a class="brand" href="/" data-brand-reset aria-label="Reset dashboard filters">
      <img class="brand-logo" src="/static/logo_s.png" alt="" width="200" height="147" aria-hidden="true">
      <h1>{{.Branding}}</h1>
    </a>

    {{if .HasHosts}}
    <div class="host-control" data-host-control></div>
    {{end}}

    <div class="dropdown gpu-selector" data-dropdown="gpu">
      <button class="dropdown-trigger gpu-trigger" type="button" data-gpu-trigger aria-expanded="false">
        <span data-gpu-summary>Waiting for GPUs</span>
      </button>
      <div class="dropdown-panel gpu-panel" data-gpu-panel>
        <div class="dropdown-actions">
          <button type="button" data-select-all>Select all</button>
          <button type="button" data-clear-all>Clear all</button>
        </div>
        <div class="device-list" data-device-list>
          <span class="muted">Waiting for devices...</span>
        </div>
      </div>
    </div>

    <div class="dropdown chart-selector" data-dropdown="charts">
      <button class="dropdown-trigger chart-trigger" type="button" data-chart-trigger aria-expanded="false">
        <span data-chart-summary>Default charts</span>
      </button>
      <div class="dropdown-panel chart-panel" data-chart-panel>
        <div class="dropdown-actions">
          <button type="button" data-chart-select-all>Select all</button>
          <button type="button" data-chart-clear-all>Clear all</button>
        </div>
        <div class="chart-list" data-chart-list></div>
      </div>
    </div>

    <button class="host-info-trigger" type="button" data-host-info-trigger aria-label="Host information" title="Host information">i</button>

    <div class="topbar-spacer"></div>

    <div class="control-section" aria-live="polite">
      <span class="status-indicator">
        <button class="status-dot" type="button" data-status-dot aria-label="Starting" aria-describedby="status-tooltip"></button>
        <span class="status-tooltip" id="status-tooltip" role="tooltip" data-status-tooltip>Starting</span>
      </span>

      <div class="dropdown time-selector" data-dropdown="time">
        <label class="control-input-label time-input-label">
          <span>Window:</span>
          <input type="number" min="1" step="1" value="5" data-time-minutes aria-label="Time window in minutes">
          <span>min</span>
        </label>
        <div class="dropdown-panel time-panel" data-time-panel>
          <button type="button" data-time-preset="5">5 min</button>
          <button type="button" data-time-preset="15">15 min</button>
          <button type="button" data-time-preset="60">1 hour</button>
        </div>
      </div>

      <div class="dropdown refresh-selector" data-dropdown="refresh">
        <label class="control-input-label refresh-input-label">
          <span>Refresh:</span>
          <input type="number" min="0" step="1" value="1" data-refresh-interval aria-label="Refresh interval in seconds">
          <span>sec</span>
        </label>
        <div class="dropdown-panel refresh-panel" data-refresh-panel>
          <button type="button" data-refresh-preset="0">Off</button>
          <button type="button" data-refresh-preset="1">1 sec</button>
          <button type="button" data-refresh-preset="5">5 sec</button>
          <button type="button" data-refresh-preset="60">1 min</button>
          <button type="button" data-refresh-preset="300">5 min</button>
        </div>
      </div>

      <button class="primary-action" type="button" data-refresh-now>Refresh</button>
    </div>
  </header>

  <section class="summary" data-summary aria-label="Current GPU values"></section>
  <section class="charts-grid" data-charts aria-label="GPU metric charts"></section>
  <footer class="app-footer">
    <a href="https://github.com/deniskrumko/nvidia-smi-web-ui" target="_blank" rel="noreferrer">deniskrumko/nvidia-smi-web-ui {{.Version}}</a>
  </footer>

  <div class="host-modal" data-host-modal hidden>
    <div class="host-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="host-modal-title">
      <button class="host-modal-close" type="button" data-host-modal-close aria-label="Close host information">&times;</button>
      <h2 id="host-modal-title" data-host-modal-title>Host</h2>
      <dl class="host-modal-details">
        <div class="host-info-card">
          <dt>HOST_NAME</dt>
          <dd data-host-modal-host-name>n/a</dd>
        </div>
        <div class="host-info-card">
          <dt>Driver version</dt>
          <dd data-host-modal-driver-version>n/a</dd>
        </div>
        <div class="host-info-card">
          <dt>CUDA version</dt>
          <dd data-host-modal-cuda-version>n/a</dd>
        </div>
        <div class="host-info-card">
          <dt>GPU devices</dt>
          <dd data-host-modal-gpu-count>0</dd>
        </div>
        <div class="host-info-card">
          <dt>Total VRAM</dt>
          <dd data-host-modal-memory-total>n/a</dd>
        </div>
        <div class="host-info-card">
          <dt>Used VRAM</dt>
          <dd data-host-modal-memory-used>n/a</dd>
        </div>
        <div class="host-info-card">
          <dt>Free VRAM</dt>
          <dd data-host-modal-memory-free>n/a</dd>
        </div>
        <div class="host-info-card">
          <dt>GPU utilization</dt>
          <dd data-host-modal-gpu-utilization>n/a</dd>
        </div>
      </dl>
    </div>
  </div>
</main>
{{end}}
